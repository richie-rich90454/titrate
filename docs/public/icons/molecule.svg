<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Benzene ring - hexagon structure -->
  <!-- Outer hexagon (carbon bonds) -->
  <polygon points="24,4 40,12 40,28 24,36 8,28 8,12" stroke-width="2.5"/>

  <!-- Inner circle representing alternating double bonds (delocalized electrons) -->
  <circle cx="24" cy="20" r="10" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Atom nodes at vertices -->
  <circle cx="24" cy="4" r="2" fill="currentColor"/>
  <circle cx="40" cy="12" r="2" fill="currentColor"/>
  <circle cx="40" cy="28" r="2" fill="currentColor"/>
  <circle cx="24" cy="36" r="2" fill="currentColor"/>
  <circle cx="8" cy="28" r="2" fill="currentColor"/>
  <circle cx="8" cy="12" r="2" fill="currentColor"/>

  <!-- Hydrogen atoms (small circles extending outward) -->
  <circle cx="24" cy="0" r="1.2" fill="currentColor" opacity="0.7"/>
  <circle cx="46" cy="12" r="1.2" fill="currentColor" opacity="0.7"/>
  <circle cx="46" cy="28" r="1.2" fill="currentColor" opacity="0.7"/>
  <circle cx="24" cy="40" r="1.2" fill="currentColor" opacity="0.7"/>
  <circle cx="2" cy="28" r="1.2" fill="currentColor" opacity="0.7"/>
  <circle cx="2" cy="12" r="1.2" fill="currentColor" opacity="0.7"/>

  <!-- Bond lines to hydrogen atoms -->
  <line x1="24" y1="4" x2="24" y2="0" stroke-width="1" opacity="0.7"/>
  <line x1="40" y1="12" x2="46" y2="12" stroke-width="1" opacity="0.7"/>
  <line x1="40" y1="28" x2="46" y2="28" stroke-width="1" opacity="0.7"/>
  <line x1="24" y1="36" x2="24" y2="40" stroke-width="1" opacity="0.7"/>
  <line x1="8" y1="28" x2="2" y2="28" stroke-width="1" opacity="0.7"/>
  <line x1="8" y1="12" x2="2" y2="12" stroke-width="1" opacity="0.7"/>
</svg>